name: Compress Visual Art Images
on:
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Compress images
        run: |
          for f in public/visual/*.png public/visual/*.jpg public/visual/*.jpeg; do
            [ -f "$f" ] || continue
            before=$(stat -c%s "$f")
            magick "$f" -resize "900x>" -quality 78 "$f"
            after=$(stat -c%s "$f")
            echo "$f: $(( before/1024 ))kb → $(( after/1024 ))kb"
          done

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: compress visual art images"
