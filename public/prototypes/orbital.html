<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital — Orbiting Bodies & Trails</title>
<style>
  html,body{margin:0;height:100%;background:#03030c;overflow:hidden;font-family:ui-sans-serif,system-ui,sans-serif;}
  #c{display:block;width:100vw;height:100vh;}
  .hud{position:fixed;left:16px;bottom:16px;color:#8b8ba7;font-size:12px;line-height:1.6;background:rgba(8,8,20,.55);
       padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(8px);}
  .hud b{color:#cfcfe6;}
  .row{display:flex;gap:14px;align-items:center;margin-top:4px;}
  button{background:rgba(255,255,255,.06);color:#cfcfe6;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;}
  button:hover{background:rgba(255,255,255,.12);}
  input[type=range]{accent-color:#7c6cff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div><b>Orbital</b> — orbiting bodies & comet trails (simulated audio)</div>
  <div class="row">
    <label>Energy <input id="energy" type="range" min="0" max="100" value="55"></label>
    <button id="beat">Trigger beat</button>
    <button id="auto">Auto-beat: ON</button>
  </div>
  <div class="row" style="color:#6a6a85">Bodies trace tilted orbits; active frequencies trail brighter</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:false});
let W,H,DPR;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

const PALETTES=[
  ['#7c6cff','#42d9ff','#ff6ec7'],
  ['#36f1cd','#3d8bff','#b06cff'],
  ['#ff8a3d','#ffd23d','#ff4d6d'],
  ['#ff5e9c','#a06bff','#5cc8ff'],
];
let palIdx=0,palT=0;
function lerpHex(a,b,t){const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const ar=pa>>16,ag=(pa>>8)&255,ab=pa&255,br=pb>>16,bg=(pb>>8)&255,bb=pb&255;
  return [Math.round(ar+(br-ar)*t),Math.round(ag+(bg-ag)*t),Math.round(ab+(bb-ab)*t)];}
function rgb(c){return c[0]+','+c[1]+','+c[2];}

// ── Orbits ────────────────────────────────────────────────────────────────
const NORBIT=7;
const orbits=[];
function initOrbits(){
  orbits.length=0;
  for(let i=0;i<NORBIT;i++){
    const t=i/(NORBIT-1);
    orbits.push({
      a: 0.16+t*0.30,                 // semi-major (frac of minDim)
      ecc: 0.15+Math.random()*0.25,   // eccentricity
      tilt: 0.30+t*0.45,              // vertical squash (orbital plane tilt)
      planeRot: (i*0.6)+Math.random()*0.5, // rotation of the ellipse in screen plane
      angle: Math.random()*Math.PI*2, // current body angle
      speed: 0.9-t*0.5,               // inner = faster (Keplerian feel)
      hue: t,
      band: t,                        // freq band this body listens to
      trail: [],                      // recent positions
      dir: i%2===0?1:-1,              // some orbit the other way
    });
  }
}
initOrbits();

let energyTarget=0.55,energy=0.55,bass=0,mids=0,highs=0,burst=0,autoBeat=true,lastBeat=0;
document.getElementById('energy').oninput=e=>energyTarget=e.target.value/100;
document.getElementById('beat').onclick=()=>burst=Math.min(1,burst+0.8);
const ab=document.getElementById('auto');ab.onclick=()=>{autoBeat=!autoBeat;ab.textContent='Auto-beat: '+(autoBeat?'ON':'OFF');};

// fake per-band frequency value
function bandVal(b){
  return Math.max(0, energy*(0.45+0.55*Math.sin(b*7+ (b<0.4?bass*4:mids*4) + performance.now()*0.001*(2+b*3))));
}

let t=0,last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;t+=dt;
  palT+=dt*0.05;if(palT>=1){palT=0;palIdx=(palIdx+1)%PALETTES.length;}

  energy+=(energyTarget-energy)*0.05;
  bass =energy*(0.55+0.45*Math.sin(t*2.0))*0.9;
  mids =energy*(0.5+0.5*Math.sin(t*3.4+1))*0.7;
  highs=energy*(0.5+0.5*Math.sin(t*6.0+2))*0.6;
  if(autoBeat&&now-lastBeat>(560-energy*240)){burst=Math.min(1,burst+0.5+energy*0.3);lastBeat=now;}
  burst*=0.90;  // smooth, graceful decay

  const pA=PALETTES[palIdx],pB=PALETTES[(palIdx+1)%PALETTES.length];
  const live=[0,1,2].map(k=>lerpHex(pA[k],pB[k],palT));

  // gentle trail fade (long, smooth)
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(3,3,12,0.18)';
  ctx.fillRect(0,0,W,H);

  const cx=W/2,cy=H/2,minDim=Math.min(W,H);

  ctx.globalCompositeOperation='lighter';

  // faint orbit paths (drawn first, behind bodies)
  for(const o of orbits){
    const col=live[Math.floor(o.hue*3)%3];
    ctx.strokeStyle=`rgba(${rgb(col)},0.06)`;
    ctx.lineWidth=1;
    ctx.save();
    ctx.translate(cx,cy);ctx.rotate(o.planeRot);ctx.scale(1,o.tilt);
    const A=o.a*minDim, B=A*(1-o.ecc);
    ctx.beginPath();ctx.ellipse(0,0,A,B,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // central core glow (behind bodies)
  const coreR=minDim*0.05*(1+burst*0.5+bass*0.3);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR*5);
  cg.addColorStop(0,`rgba(${rgb(live[0])},${0.18+burst*0.18})`);
  cg.addColorStop(0.4,`rgba(${rgb(live[1])},${0.06})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,coreR*5,0,Math.PI*2);ctx.fill();

  // helper: position on a body's tilted ellipse
  function pos(o,angle){
    const A=o.a*minDim, B=A*(1-o.ecc);
    let x=Math.cos(angle)*A, y=Math.sin(angle)*B*o.tilt;
    // rotate by planeRot
    const cr=Math.cos(o.planeRot),sr=Math.sin(o.planeRot);
    const rx=x*cr - (y/o.tilt)*sr*o.tilt;       // keep tilt squash after rotation (approx)
    const ry=x*sr + y*cr;
    return {x:cx+rx, y:cy+ry, depth: Math.sin(angle)}; // depth: +behind / -front (for size)
  }

  // bodies + trails
  for(const o of orbits){
    const bv=bandVal(o.band);
    // speed: faster on inner orbits, gentle beat swell
    o.angle += o.dir*dt*(0.5+o.speed*1.1)*(1+bass*0.5)*(0.8+energy*0.5);
    const p=pos(o,o.angle);
    // record trail
    o.trail.push({x:p.x,y:p.y,depth:p.depth});
    const maxTrail=Math.floor(14+bv*30+burst*10);
    while(o.trail.length>maxTrail) o.trail.shift();

    const col=live[Math.floor(o.hue*3)%3];
    // draw trail as fading line
    for(let i=1;i<o.trail.length;i++){
      const tt=i/o.trail.length;
      const a=tt*tt*(0.10+bv*0.5+burst*0.1);
      if(a<0.005)continue;
      ctx.strokeStyle=`rgba(${rgb(col)},${a})`;
      ctx.lineWidth=(0.5+tt*(1.5+bv*3));
      ctx.beginPath();ctx.moveTo(o.trail[i-1].x,o.trail[i-1].y);ctx.lineTo(o.trail[i].x,o.trail[i].y);ctx.stroke();
    }
    // body: size & brightness shift with depth (front bodies bigger/brighter)
    const depthF=0.6-p.depth*0.4;        // front (depth -1) → 1.0, back (depth +1) → 0.2
    const size=(2.4+bv*5)*depthF*(1+burst*0.3);
    // halo
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,size*3);
    g.addColorStop(0,`rgba(${rgb(col)},${(0.3+bv*0.5)*depthF})`);
    g.addColorStop(1,`rgba(${rgb(col)},0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,size*3,0,Math.PI*2);ctx.fill();
    // body
    ctx.fillStyle=`rgba(${rgb(col)},${Math.min(1,0.7+bv*0.5)*depthF})`;
    ctx.beginPath();ctx.arc(p.x,p.y,size,0,Math.PI*2);ctx.fill();
    // hot center
    ctx.fillStyle=`rgba(255,255,255,${0.6*depthF})`;
    ctx.beginPath();ctx.arc(p.x,p.y,size*0.4,0,Math.PI*2);ctx.fill();
  }

  // bright core (in front of everything)
  const coreGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  coreGrad.addColorStop(0,'#ffffff');
  coreGrad.addColorStop(0.3,`rgba(${rgb(live[0])},1)`);
  coreGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=coreGrad;ctx.beginPath();ctx.arc(cx,cy,coreR,0,Math.PI*2);ctx.fill();

  ctx.globalCompositeOperation='source-over';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
